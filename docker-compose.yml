volumes:
  prometheus_data:
  grafana_data:

networks:
  gateii:
    driver: bridge

# Core services — 3 containers: proxy, prometheus, grafana
services:
  openresty:
    image: openresty/openresty:alpine
    container_name: gateii-proxy
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROXY_MODE=${PROXY_MODE:-passthrough}
      - PASSTHROUGH_USER=${PASSTHROUGH_USER:-}
    volumes:
      - ./config/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config/openresty/lua:/etc/nginx/lua:ro
      - ./data:/etc/nginx/data
    ports:
      - "${PROXY_PORT:-8888}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        test -f /etc/nginx/data/keys.json || echo '{}' > /etc/nginx/data/keys.json
        exec /usr/local/openresty/bin/openresty -g 'daemon off;'
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: gateii-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateii
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: gateii-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
