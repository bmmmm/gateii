volumes:
  prometheus_data:
  grafana_data:

networks:
  gateii:
    driver: bridge

# Core services — 3 containers: proxy, prometheus, grafana
services:
  openresty:
    image: openresty/openresty:1.27.1.2-0-alpine
    container_name: gateii-proxy
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROXY_MODE=${PROXY_MODE:-passthrough}
      - PASSTHROUGH_USER=${PASSTHROUGH_USER:-}
    volumes:
      - ./config/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config/openresty/lua:/etc/nginx/lua:ro
      - ./data:/etc/nginx/data
    ports:
      - "${PROXY_PORT:-8888}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache ca-certificates >/dev/null 2>&1
        test -f /etc/nginx/data/keys.json || echo '{}' > /etc/nginx/data/keys.json
        exec /usr/local/openresty/bin/openresty -g 'daemon off;'
    networks:
      - gateii
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: gateii-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateii
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.4.2
    container_name: gateii-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Plugins (opt-in via docker compose --profile <name> up -d) ---

  git-stats:
    profiles: ["git-stats"]
    image: alpine:3.19
    container_name: gateii-git-stats
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./scripts/git-stats.sh:/app/git-stats.sh:ro
      - ./data:/data
      # Repo mounts added by: admin.sh plugin enable git-stats <path> [path...]
    environment:
      - GIT_AUTHOR=${GIT_AUTHOR:-}
      - GIT_STATS_INTERVAL=${GIT_STATS_INTERVAL:-300}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache git >/dev/null 2>&1
        exec /bin/sh /app/git-stats.sh --container
    networks:
      - gateii
