volumes:
  prometheus_data:
  grafana_data:

networks:
  gateii:
    driver: bridge

# Core services — 3 containers: proxy, prometheus, grafana
services:
  openresty:
    image: openresty/openresty:1.27.1.2-0-alpine
    container_name: gateii-proxy
    restart: unless-stopped
    user: "65534:65534"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROXY_MODE=${PROXY_MODE:-passthrough}
      - PASSTHROUGH_USER=${PASSTHROUGH_USER:-}
      - CONSOLE_ENABLED=${CONSOLE_ENABLED:-0}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Tuning (all optional, Lua falls back to sensible defaults)
      - CB_FAILURE_THRESHOLD=${CB_FAILURE_THRESHOLD:-}
      - CB_COOLDOWN_SECONDS=${CB_COOLDOWN_SECONDS:-}
      - BOOTSTRAP_CONFIRM_TTL=${BOOTSTRAP_CONFIRM_TTL:-}
      - BOOTSTRAP_PENDING_TTL=${BOOTSTRAP_PENDING_TTL:-}
      - BOOTSTRAP_PENDING_MAX=${BOOTSTRAP_PENDING_MAX:-}
      - BOOTSTRAP_NONCE_TTL=${BOOTSTRAP_NONCE_TTL:-}
      - AUTH_CACHE_NEG_TTL=${AUTH_CACHE_NEG_TTL:-}
      - AUTH_CACHE_POS_TTL=${AUTH_CACHE_POS_TTL:-}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-}
      - CONSOLE_URL=${CONSOLE_URL:-}
      - COUNTER_RETENTION_DAYS=${COUNTER_RETENTION_DAYS:-}
      - HEALTH_CHECK_CONNECT_MS=${HEALTH_CHECK_CONNECT_MS:-}
      - HEALTH_CHECK_SEND_MS=${HEALTH_CHECK_SEND_MS:-}
      - HEALTH_CHECK_READ_MS=${HEALTH_CHECK_READ_MS:-}
    volumes:
      - ./config/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config/openresty/lua:/etc/nginx/lua:ro
      - ./config/openresty/html:/etc/nginx/html:ro
      - ./data:/etc/nginx/data
    tmpfs:
      - /usr/local/openresty/nginx/client_body_temp
      - /usr/local/openresty/nginx/proxy_temp
      - /usr/local/openresty/nginx/fastcgi_temp
      - /usr/local/openresty/nginx/scgi_temp
      - /usr/local/openresty/nginx/uwsgi_temp
      - /usr/local/openresty/nginx/logs:mode=1777
    ports:
      - "${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-8888}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        test -f /etc/nginx/data/keys.json || echo '{}' > /etc/nginx/data/keys.json
        exec /usr/local/openresty/bin/openresty -g 'daemon off;'
    networks:
      - gateii
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: gateii-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${HISTORY_RETENTION:-0}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateii
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.4.2
    container_name: gateii-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      # Silence the k8s-style dashboard-service polling loop — 78% of log noise.
      # The "kubernetes" in the name refers to Grafana's internal unified-storage
      # API style, not a real k8s cluster. The feature was promoted to GA in 12.4
      # so GF_FEATURE_TOGGLES_DISABLE is ignored; we dampen the noisy loggers at
      # the log-filter level instead.
      - GF_LOG_FILTERS=dashboard-service:warn bleve-backend:warn
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Plugins ---
  # git-tracking: defined in docker-compose.override.yml (created by admin.sh plugin enable git-tracking)
  # console: controlled via CONSOLE_ENABLED env var (no extra container)
