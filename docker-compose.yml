volumes:
  prometheus_data:
  grafana_data:

networks:
  gateii:
    driver: bridge
    ipam:
      config:
        - subnet: "172.28.0.0/24"

# Core services — 3 containers: proxy, prometheus, grafana
services:
  openresty:
    image: openresty/openresty:1.27.1.2-0-alpine
    container_name: gateii-proxy
    restart: unless-stopped
    user: "65534:65534"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROXY_MODE=${PROXY_MODE:-passthrough}
      - PASSTHROUGH_USER=${PASSTHROUGH_USER:-}
      - CONSOLE_ENABLED=${CONSOLE_ENABLED:-0}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Tuning (all optional, Lua falls back to sensible defaults)
      - CB_FAILURE_THRESHOLD=${CB_FAILURE_THRESHOLD:-}
      - CB_COOLDOWN_SECONDS=${CB_COOLDOWN_SECONDS:-}
      - BOOTSTRAP_CONFIRM_TTL=${BOOTSTRAP_CONFIRM_TTL:-}
      - BOOTSTRAP_PENDING_TTL=${BOOTSTRAP_PENDING_TTL:-}
      - BOOTSTRAP_PENDING_MAX=${BOOTSTRAP_PENDING_MAX:-}
      - BOOTSTRAP_NONCE_TTL=${BOOTSTRAP_NONCE_TTL:-}
      - AUTH_CACHE_NEG_TTL=${AUTH_CACHE_NEG_TTL:-}
      - AUTH_CACHE_POS_TTL=${AUTH_CACHE_POS_TTL:-}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-}
      - CONSOLE_URL=${CONSOLE_URL:-}
      - COUNTER_RETENTION_DAYS=${COUNTER_RETENTION_DAYS:-}
      - HEALTH_CHECK_CONNECT_MS=${HEALTH_CHECK_CONNECT_MS:-}
      - HEALTH_CHECK_SEND_MS=${HEALTH_CHECK_SEND_MS:-}
      - HEALTH_CHECK_READ_MS=${HEALTH_CHECK_READ_MS:-}
      # Local omlx (passthrough provider). Only used by the Console "Agents" tab
      # to query /v1/models/status; runtime requests forward whatever Bearer
      # token the client sent.
      - OMLX_URL=${OMLX_URL:-http://host.docker.internal:8000}
      - OMLX_API_KEY=${OMLX_API_KEY:-}
      # Shared secret openresty injects when forwarding to compose-ctl.
      # Defense-in-depth: without this any sibling container on the gateii
      # docker network could trigger /run-bench or /services/<x>/<action>.
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
    volumes:
      - ./config/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config/openresty/lua:/etc/nginx/lua:ro
      - ./config/openresty/html:/etc/nginx/html:ro
      - ./data:/etc/nginx/data
    tmpfs:
      # All mounts need mode=1777 because the container runs as uid 65534
      # (see `user:` above). Default tmpfs mode is 755 owned by root,
      # which blocks the unprivileged user from writing request bodies,
      # upstream bodies, and PID files. Symptom: every POST /v1/messages
      # returns 500 with [crit] "Permission denied" in the proxy log.
      - /usr/local/openresty/nginx/client_body_temp:mode=1777
      - /usr/local/openresty/nginx/proxy_temp:mode=1777
      - /usr/local/openresty/nginx/fastcgi_temp:mode=1777
      - /usr/local/openresty/nginx/scgi_temp:mode=1777
      - /usr/local/openresty/nginx/uwsgi_temp:mode=1777
      - /usr/local/openresty/nginx/logs:mode=1777
    ports:
      - "${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-8888}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        test -f /etc/nginx/data/keys.json || echo '{}' > /etc/nginx/data/keys.json
        chmod 600 /etc/nginx/data/keys.json
        exec /usr/local/openresty/bin/openresty -g 'daemon off;'
    networks:
      - gateii
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: gateii-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${HISTORY_RETENTION:-0}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateii
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.4.3
    container_name: gateii-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      # Silence the k8s-style dashboard-service polling loop — 78% of log noise.
      # The "kubernetes" in the name refers to Grafana's internal unified-storage
      # API style, not a real k8s cluster. The feature was promoted to GA in 12.4
      # so GF_FEATURE_TOGGLES_DISABLE is ignored; we dampen the noisy loggers at
      # the log-filter level instead.
      - GF_LOG_FILTERS=dashboard-service:warn bleve-backend:warn
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Compose-control sidecar: gives the admin console real start/stop/restart
  # buttons over the gateii services. Mounts the docker socket → has
  # equivalent power to "anyone with docker CLI access on the host". The
  # network attack surface is minimal: bound to the gateii Docker network,
  # not exposed to the host, accessed only via the proxy under ADMIN_TOKEN.
  # Whitelist: only services in this compose project, only start/stop/
  # restart/recreate (no exec, no image manipulation).
  compose-ctl:
    image: python:3.12-alpine
    container_name: gateii-compose-ctl
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Whole project dir read-only so optional override.yml + .env work without
      # bind-mount magic (single-file mounts of files that may not exist would
      # silently create them as empty dirs).
      - .:/workspace:ro
      # Writable layer for agent-bench: it writes to data/agents/. Mounted
      # AFTER the read-only :ro mount so this overrides for that subdir only.
      - ./data/agents:/workspace/data/agents:rw
      - ./scripts/compose-ctl.py:/app/compose-ctl.py:ro
    working_dir: /workspace
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-gateii}
      # Used by scripts/agent-bench when triggered via /run-bench. Inside the
      # container "localhost" is the container itself; we need host.docker
      # .internal to reach the omlx server on the Mac host.
      - OMLX_URL=${OMLX_URL:-http://host.docker.internal:8000}
      - OMLX_API_KEY=${OMLX_API_KEY:-}
      # Same shared secret as openresty — checked on every non-/health request
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - COMPOSE_FILE=/workspace/docker-compose.yml:/workspace/docker-compose.override.yml
      - PROXY_SERVICE_NAME=openresty
      - CTL_PORT=8090
    networks:
      - gateii
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache docker-cli docker-cli-compose >/dev/null 2>&1
        exec python3 /app/compose-ctl.py
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health',timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Plugins ---
  # git-tracking: defined in docker-compose.override.yml (created by admin.sh plugin enable git-tracking)
  # console: controlled via CONSOLE_ENABLED env var (no extra container)
