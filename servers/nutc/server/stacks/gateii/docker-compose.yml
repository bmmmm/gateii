# gateii — NUTC production stack
# 3 containers: openresty (proxy), prometheus (metrics), grafana (dashboards)
#
# Deploy: bash scripts/deploy-nutc.sh  (from the gateii repo)
# This file is synced to ~/docker/gateii/ on the NUTC host; config/ and
# grafana/ subtrees are rsynced from the gateii repo at deploy time.

volumes:
  prometheus_data:
  grafana_data:

networks:
  gateii:
    driver: bridge

services:
  openresty:
    image: openresty/openresty:1.27.1.2-0-alpine
    container_name: gateii-proxy
    restart: unless-stopped
    user: "65534:65534"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PROXY_MODE=${PROXY_MODE:-apikey}
      - PASSTHROUGH_USER=${PASSTHROUGH_USER:-}
      - CONSOLE_ENABLED=${CONSOLE_ENABLED:-1}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set in .env}
      - RATE_LIMIT_5H_WINDOW_SECONDS=${RATE_LIMIT_5H_WINDOW_SECONDS:-}
    volumes:
      - ./config/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./config/openresty/lua:/etc/nginx/lua:ro
      - ./config/openresty/html:/etc/nginx/html:ro
      - ./data:/etc/nginx/data
    tmpfs:
      - /usr/local/openresty/nginx/client_body_temp
      - /usr/local/openresty/nginx/proxy_temp
      - /usr/local/openresty/nginx/fastcgi_temp
      - /usr/local/openresty/nginx/scgi_temp
      - /usr/local/openresty/nginx/uwsgi_temp
      - /usr/local/openresty/nginx/logs:mode=1777
    ports:
      - "${PROXY_BIND:-127.0.0.1}:${PROXY_PORT:-8888}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        test -f /etc/nginx/data/keys.json || echo '{}' > /etc/nginx/data/keys.json
        exec /usr/local/openresty/bin/openresty -g 'daemon off;'
    networks:
      - gateii
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: gateii-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${HISTORY_RETENTION:-90d}
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gateii
    # prometheus stays on the internal network; grafana reaches it at gateii-prometheus:9090
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.4.2
    container_name: gateii-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    networks:
      - gateii
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
