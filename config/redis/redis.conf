# Bind only to Docker bridge interface — not exposed to host
bind 0.0.0.0
protected-mode no
# NOTE: requirepass recommended for production; update auth.lua/tracking.lua/exporter accordingly
port 6379

# Memory: evict only TTL-bearing keys (daily usage, blocked), never evict keys/counters
maxmemory 256mb
maxmemory-policy volatile-lru

# Persist to volume for key survival across restarts
dir /data
dbfilename dump.rdb
save 900 1

# No AOF needed
appendonly no

loglevel notice
