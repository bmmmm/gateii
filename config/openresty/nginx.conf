# gateii — LLM API proxy
# Env vars available to Lua: ANTHROPIC_API_KEY
env ANTHROPIC_API_KEY;
env PROXY_MODE;
env PASSTHROUGH_USER;

worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;
    lua_package_path "/etc/nginx/lua/?.lua;;";

    # 10m allows vision payloads (base64 images) — Anthropic limit is ~5MB per image
    client_max_body_size 10m;

    lua_shared_dict auth_cache     10m;   # L1 key validation cache
    lua_shared_dict limit_req       5m;   # rate limiter state

    server {
        listen 8080;

        location = /health {
            content_by_lua_block { ngx.say("ok") }
        }

        location / {
            lua_need_request_body on;

            access_by_lua_file  /etc/nginx/lua/auth.lua;
            content_by_lua_file /etc/nginx/lua/handler.lua;
        }
    }
}
