# gateii — LLM API proxy
# Env vars available to Lua: ANTHROPIC_API_KEY
env ANTHROPIC_API_KEY;
env PROXY_MODE;
env PASSTHROUGH_USER;
env CONSOLE_ENABLED;
env RATE_LIMIT_5H_WINDOW_SECONDS;
env OPENAI_API_KEY;
env OPENROUTER_API_KEY;
env ADMIN_TOKEN;

worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_package_path "/etc/nginx/lua/?.lua;;";

    # Load persisted limits on startup; start rate limit window auto-reset timer
    init_worker_by_lua_block {
        ngx.shared.counters:set("_worker_start", ngx.now())
        if ngx.worker.id() == 0 then
            local cjson = require "cjson.safe"
            local schema = require "schema"

            local limits_data, limits_err = schema.load_validated("/etc/nginx/data/limits.json", schema.validate_limits)
            if limits_err then
                ngx.log(ngx.ERR, "startup: limits.json validation failed — ", limits_err)
            elseif limits_data then
                local n = 0
                for user, limits in pairs(limits_data) do
                    ngx.shared.blocking:set("limits|" .. user, cjson.encode(limits))
                    n = n + 1
                end
                ngx.log(ngx.NOTICE, "loaded ", n, " user limits from limits.json")
            end

            -- Pre-load tokens_window_limit so handler.lua can compute ratelimit_remaining
            -- from the utilization fraction in anthropic-ratelimit-unified-5h-utilization
            local pcfg, pcfg_err = schema.load_validated("/etc/nginx/lua/providers.json", schema.validate_providers)
            if pcfg_err then
                ngx.log(ngx.ERR, "startup: providers.json validation failed — ", pcfg_err)
            elseif pcfg and pcfg.providers then
                local active_id = pcfg.active_provider or "anthropic"
                for _, p in ipairs(pcfg.providers) do
                    if p.id == active_id and p.tokens_window_limit then
                        ngx.shared.counters:set("tokens_window_limit", p.tokens_window_limit)
                        break
                    end
                end
            end

            local _, keys_err = schema.load_validated("/etc/nginx/data/keys.json", schema.validate_keys)
            if keys_err then
                ngx.log(ngx.ERR, "startup: keys.json validation failed — ", keys_err)
            end

            -- Auto-reset rate limit window: when ratelimit_reset_ts is in the past,
            -- restore ratelimit_remaining so metrics stay accurate between sessions.
            -- Window duration from providers.json (window_seconds) or
            -- RATE_LIMIT_WINDOW_SECONDS env override. Fires every 60s on worker 0.
            local timer_ok, timer_err = ngx.timer.every(60, function(premature)
                if premature then return end
                local cd = ngx.shared.counters
                local reset_ts = cd:get("ratelimit_reset_ts")
                if not reset_ts then return end
                local y, mo, d, h, mi, se =
                    reset_ts:match("^(%d+)-(%d+)-(%d+)T(%d+):(%d+):(%d+)")
                if not y then return end
                local mdays = {0,31,59,90,120,151,181,212,243,273,304,334}
                local days_epoch = (tonumber(y) - 1970) * 365
                    + math.floor((tonumber(y) - 1969) / 4)
                    + (mdays[tonumber(mo)] or 0) + tonumber(d) - 1
                local reset_unix = days_epoch * 86400
                    + tonumber(h) * 3600 + tonumber(mi) * 60 + tonumber(se)
                if ngx.time() < reset_unix then return end
                -- window expired — read config
                local window_secs = tonumber(os.getenv("RATE_LIMIT_5H_WINDOW_SECONDS"))
                local tokens_limit
                local cjson2 = require "cjson.safe"
                local pf = io.open("/etc/nginx/lua/providers.json", "r")
                if pf then
                    local data = pf:read("*a"); pf:close()
                    local cfg = cjson2.decode(data)
                    if cfg and cfg.providers then
                        local active = cfg.active_provider or "anthropic"
                        for _, p in ipairs(cfg.providers) do
                            if p.id == active then
                                tokens_limit = p.tokens_window_limit
                                if not window_secs then
                                    window_secs = p.window_seconds
                                end
                                break
                            end
                        end
                    end
                end
                window_secs = window_secs or 18000
                if tokens_limit then
                    cd:set("ratelimit_remaining", tokens_limit)
                    cd:set("tokens_window_limit", tokens_limit)
                end
                local now = ngx.time()
                cd:set("ratelimit_reset_ts",
                    os.date("!%Y-%m-%dT%H:%M:%SZ", now + window_secs))
                ngx.log(ngx.INFO, "rl-window-reset: auto remaining=",
                    tokens_limit or "?", " window=", window_secs, "s")
            end)
            if not timer_ok then
                ngx.log(ngx.ERR, "rl-window-reset: timer init failed: ", timer_err)
            end
        end

        -- Bootstrap sweeper (worker 0 only; no-op on other workers)
        local bootstrap_ok, bootstrap = pcall(require, "bootstrap")
        if bootstrap_ok then
            bootstrap.start_sweeper()
        else
            ngx.log(ngx.ERR, "startup: failed to load bootstrap module — ", bootstrap)
        end
    }

    # rid from the response header auth.lua sets via ngx.header["X-Request-Id"]
    log_format gateii_json escape=json '{"ts":"$time_iso8601",'
        '"rid":"$sent_http_x_request_id",'
        '"method":"$request_method","uri":"$uri","status":$status,'
        '"bytes_sent":$bytes_sent,"request_time":$request_time,'
        '"ua":"$http_user_agent","remote":"$remote_addr"}';

    # 10m allows vision payloads (base64 images) — Anthropic limit is ~5MB per image
    client_max_body_size 10m;
    client_body_timeout 120s;

    lua_shared_dict auth_cache     1m;   # key->user mapping (apikey mode)
    lua_shared_dict counters      10m;   # token/request/error/latency counters
    lua_shared_dict blocking       1m;   # blocked:<user> flags + limits
    lua_shared_dict limit_req      5m;   # rate limiter state
    lua_shared_dict admin_sessions  1m;   # admin session tokens (1h TTL)
    lua_shared_dict bootstrap_pending   1m;   # bootstrap code -> pending entry
    lua_shared_dict bootstrap_sessions  1m;   # confirm token -> installed session

    server {
        listen 8080;

        location = /health {
            access_log off;
            content_by_lua_block {
                local cjson = require "cjson.safe"
                local counters = ngx.shared.counters
                local blocking = ngx.shared.blocking
                local auth_cache = ngx.shared.auth_cache
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    status = "ok",
                    proxy_mode = os.getenv("PROXY_MODE") or "apikey",
                    uptime_s = math.floor(ngx.now() - (ngx.shared.counters:get("_worker_start") or ngx.now())),
                    shared_dicts = {
                        counters   = { free_bytes = counters:free_space() },
                        blocking   = { free_bytes = blocking:free_space() },
                        auth_cache = { free_bytes = auth_cache:free_space() },
                    },
                }))
            }
        }

        location = /metrics {
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            content_by_lua_file /etc/nginx/lua/metrics.lua;
        }

        # Optional: git activity metrics (plugin — see scripts/git-tracking.sh)
        location = /metrics/git {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            default_type "text/plain; version=0.0.4; charset=utf-8";
            root /etc/nginx/data;
            try_files /git-metrics.txt =204;
        }

        # Admin login — validates ADMIN_TOKEN, sets HttpOnly session cookie
        location = /internal/admin/login {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            content_by_lua_file /etc/nginx/lua/admin_login.lua;
        }

        # Admin logout — clears session cookie and removes session from shared dict
        location = /internal/admin/logout {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            content_by_lua_file /etc/nginx/lua/admin_login.lua;
        }

        location /internal/admin {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            content_by_lua_file /etc/nginx/lua/admin_api.lua;
        }

        # Proxy Prometheus API for console (avoids CORS)
        location /internal/prometheus/ {
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $prom http://gateii-prometheus:9090;
            rewrite ^/internal/prometheus/(.*) /$1 break;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
            proxy_pass $prom;
        }

        # Bootstrap handshake — public endpoints, protected by one-time code + HMAC.
        # Intentionally NOT IP-restricted so clients can self-provision over TLS.
        # POST-only enforcement + routing handled inside bootstrap.route()
        location = /internal/bootstrap/challenge {
            content_by_lua_block {
                require("bootstrap").route()
            }
        }
        location = /internal/bootstrap/exchange {
            content_by_lua_block {
                require("bootstrap").route()
            }
        }
        location = /internal/bootstrap/confirm {
            content_by_lua_block {
                require("bootstrap").route()
            }
        }

        # Admin console (opt-in plugin: CONSOLE_ENABLED=1 in .env)
        location = /console {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            default_type "text/html; charset=utf-8";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            content_by_lua_file /etc/nginx/lua/console_serve.lua;
        }

        # Browser root → console redirect (only when console enabled)
        location = / {
            content_by_lua_block {
                if os.getenv("CONSOLE_ENABLED") == "1" then
                    return ngx.redirect("/console", 302)
                end
                ngx.status = 200
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"status":"ok","proxy":"gateii","docs":"Send API requests to /v1/messages"}')
            }
        }

        # API proxy (auth required)
        location / {
            access_log /dev/stdout gateii_json;
            lua_need_request_body on;

            access_by_lua_file  /etc/nginx/lua/auth.lua;
            content_by_lua_file /etc/nginx/lua/handler.lua;
        }
    }
}
