name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks

      - name: Install luacheck
        run: |
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          luacheck config/openresty/lua/

      - name: Install busted
        run: |
          sudo apt-get install -y lua5.1 liblua5.1-dev
          sudo luarocks install --lua-version=5.1 busted
          sudo luarocks install --lua-version=5.1 lua-cjson
          # bootstrap.lua requires the `bit` module. Under LuaJIT (production) it
          # is built in; under the CI's PUC lua5.1 it is not, so bootstrap_spec
          # errors on load without LuaBitOp. Same API (both by Mike Pall).
          sudo luarocks install --lua-version=5.1 luabitop

      - name: Run busted tests
        run: |
          busted spec/

      - name: Run admin.sh shell tests
        run: |
          bash spec/admin_sh_test.sh

      - name: Add job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## CI Results
          - **luacheck**: Syntax and style validation for Lua code (vendored resty/ excluded)
          - **busted**: Unit tests for SSE parser, provider, schema, bootstrap, circuit-breaker logic (spec/)
          - **admin.sh tests**: Shell arg-parsing / dispatch tests (spec/admin_sh_test.sh)
          - **Smoke tests**: Require a live Docker stack with Colima — must be run locally via `bash scripts/smoke-test.sh`
          EOF
