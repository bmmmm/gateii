global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gateii'
    static_configs:
      - targets: ['openresty:8080']
        labels:
          instance: 'local'
    metrics_path: /metrics

  # Optional: git activity metrics (plugin — enable via scripts/git-stats.sh)
  - job_name: 'git-stats'
    scrape_interval: 5m
    static_configs:
      - targets: ['openresty:8080']
    metrics_path: /metrics/git
